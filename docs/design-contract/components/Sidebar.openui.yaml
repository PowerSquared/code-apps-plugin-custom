name: Sidebar
description: Fixed left navigation column providing the app brand mark, section links, and the current user identity.

anatomy:
  - name: Root
    description: 220px column; surface-2 background; right hairline border.
  - name: Brand
    description: Meridian mark (SVG icon) + wordmark in sidebar-wm typography; top of the column.
  - name: Nav
    description: Vertical list of NavItem elements.
  - name: NavItem
    description: 16px stroked icon (never filled) + label + optional count badge; active state has surface background.
  - name: NavCount
    description: Right-aligned numeric count in text-subtle; shown on some nav items.
  - name: Footer
    description: User Avatar + name + role; top border separates from nav; pinned to bottom.

props:
  - name: items
    type: NavItem[]
    required: true
    default: |
      [
        { id: "overview",   label: "Overview",        icon: "grid",         count: null },
        { id: "all",        label: "All assets",       icon: "list",         count: null },
        { id: "mine",       label: "Assigned to me",   icon: "user",         count: number },
        { id: "available",  label: "Available",        icon: "check-circle", count: number },
        { id: "maint",      label: "Maintenance",      icon: "wrench",       count: number },
        { id: "retired",    label: "Retired",          icon: "archive",      count: number }
      ]
  - name: activeItem
    type: string
    required: true
    description: id of the currently active navigation item.
  - name: user
    type: "{ name: string, role: string }"
    required: true

states:
  - name: default
  - name: item-hover
    trigger: pointer enters a NavItem that is not active
  - name: item-active
    trigger: NavItem label matches activeItem prop

events:
  - name: onNavigate
    payload: "{ item: NavItem }"

accessibility:
  role: navigation
  keyboard: Tab/Shift-Tab moves between items. Enter activates.
  notes: Mark the active item with aria-current="page".
